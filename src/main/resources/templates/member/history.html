<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>history page</h1>
<hr>
<table>
	<thead>
		<tr>
			<th>날짜</th>
			<th>유형</th>
			<th>보낸 분</th>
			<th>받는 분</th>
			<th>금액</th>
		</tr>
	</thead>
	<tbody>
		<tr th:if="${#lists.isEmpty(logs)}">
			<td colspan="5">최근 거래 내역이 없습니다</td>
		</tr>
		<tr th:each="log : ${logs}">
			<td th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
			<td th:text="${log.type}"></td>
			<td th:text="${log.senderName}"></td>
			<td th:text="${log.receiverName}"></td>
			<td th:text="${#numbers.formatInteger(log.amount, 0, 'COMMA')} + '원'"></td>
		</tr>
	</tbody>
</table>
<br>
<a href="/member/main">메인으로 돌아가기</a>
<th:block th:replace="~{fragments/alert :: alertScript}"></th:block>
</body>
</html>
